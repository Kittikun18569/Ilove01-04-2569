<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>May Magic With You 🧡</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&family=Great+Vibes&family=Caveat:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ffaa85;
            --bg-light: #fff5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg-light);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: #5d5d5d;
            position: fixed; /* ป้องกันการเลื่อนจอไปมาในมือถือ */
        }

        /* 🖱️ Custom Cursor (ซ่อนในมือถือ) */
        #cursor {
            width: 20px; height: 20px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--primary);
            display: none; /* ซ่อนเป็นค่าเริ่มต้น */
        }

        @media (min-width: 1024px) {
            #cursor { display: block; cursor: none; }
            * { cursor: none; }
        }

        /* ✨ Animated Background */
        .bg-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #fff, #ffe3e3);
        }

        /* 🌸 Main Container */
        .container {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100%; padding: 20px;
        }

        /* 🪟 Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 5;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ✍️ Typography */
        .title-fancy {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            background: linear-gradient(to right, #ff4d6d, #ffaa85);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .typing-text {
            font-family: 'Caveat', cursive;
            font-size: 1.4rem;
            line-height: 1.4;
            color: #444;
            height: 180px;
            overflow-y: auto;
            margin-top: 15px;
            padding: 0 10px;
            scrollbar-width: none; /* Firefox */
        }
        .typing-text::-webkit-scrollbar { display: none; } /* Chrome, Safari */

        /* 📸 Polaroid Gallery */
        .polaroid-gallery {
            display: flex; gap: 10px; justify-content: center;
            margin: 20px 0;
        }

        .polaroid {
            background: white;
            padding: 5px 5px 15px 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transform: rotate(var(--r));
            width: 28%; /* ปรับตามสัดส่วนจอ */
            max-width: 100px;
            border: 1px solid #eee;
        }

        .polaroid img { width: 100%; height: 80px; object-fit: cover; border-radius: 2px; }

        /* 🔘 Buttons */
        .btn-main {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 8px 15px rgba(255, 117, 140, 0.3);
            margin-top: 15px;
        }

        /* 🎆 Animations */
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .item { position: absolute; pointer-events: none; animation: float linear forwards; z-index: 1; }

        #mainContent, #loading { display: none; }
    </style>
</head>
<body>

<div id="cursor"></div>
<div class="bg-elements"></div>

<div class="container" id="startScreen">
    <div class="glass-card">
        <h1 class="title-fancy">Hello May 🧡</h1>
        <p style="font-size: 1rem; padding: 0 10px;">มีความสุขเล็กๆ รอเธออยู่นะ...</p>
        <button class="btn-main" onclick="startExperience()">จิ้มตรงนี้เลย 🧡</button>
    </div>
</div>

<div class="container" id="loading">
    <div class="glass-card" style="max-width: 280px;">
        <h2 style="font-family: 'Caveat', cursive; font-size: 1.8rem; color: var(--primary);">Loading Love...</h2>
        <div style="width: 100%; height: 6px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden;">
            <div id="bar" style="width: 0%; height: 100%; background: var(--primary);"></div>
        </div>
        <p id="percent">0%</p>
    </div>
</div>

<div class="container" id="mainContent">
    <div class="glass-card">
        <h1 class="title-fancy">May 2026</h1>
        
        <div class="polaroid-gallery">
            <div class="polaroid" style="--r: -5deg;">
                <img src="1.jpg" alt="1">
            </div>
            <div class="polaroid" style="--r: 3deg;">
                <img src="2.jpg" alt="2">
            </div>
            <div class="polaroid" style="--r: -2deg;">
                <img src="3.jpg" alt="3">
            </div>
        </div>

        <div class="typing-text" id="textTarget"></div>
        
        <button class="btn-main" onclick="location.reload()" style="font-size: 0.8rem; padding: 8px 20px;">ดูอีกรอบ ✨</button>
    </div>
</div>

<audio id="bgMusic" loop playsinline>
    <source src="Sunkissed – Urworld Prod.By Warmlight.mp3" type="audio/mpeg">
</audio>

<script>
    // 🖱️ Cursor Movement (Only for Desktop)
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    const msg = "สวัสดีเดือนพฤษภาคมนะคนเก่ง 🧡\nขอให้เดือนนี้ใจดีกับเธอเหมือนที่เธอใจดีกับคนอื่นนะ ขอให้ทุกวันของเธอถูกเติมเต็มด้วยเสียงหัวเราะและของอร่อยๆ\nไม่ว่าโลกจะหมุนไปเร็วแค่ไหน อย่าลืมหยุดพักแล้วยิ้มให้ตัวเองบ้างนะ\nเพราะสำหรับเรา... รอยยิ้มของเธอมันสดใสที่สุดในโลกเลย!\nแฮปปี้พฤษภาคมนะจ๊ะ ✨🌸";

    function startExperience() {
        // เล่นเพลง (iOS ต้องเริ่มผ่านปุ่มกด)
        const music = document.getElementById('bgMusic');
        music.play().catch(() => console.log("Audio play needs interaction"));

        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('loading').style.display = 'flex';
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 8;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                setTimeout(showMain, 400);
            }
            document.getElementById('bar').style.width = progress + '%';
            document.getElementById('percent').innerText = Math.floor(progress) + '%';
        }, 60);
    }

    function showMain() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('mainContent').style.display = 'flex';
        typeWriter();
    }

    let i = 0;
    function typeWriter() {
        if (i < msg.length) {
            const char = msg.charAt(i);
            const target = document.getElementById('textTarget');
            target.innerHTML += char === "\n" ? "<br>" : char;
            target.scrollTop = target.scrollHeight; // เลื่อนลงตามข้อความอัตโนมัติ
            i++;
            setTimeout(typeWriter, 50);
        }
    }

    // 🌸 Decoration Generator (ปรับให้เบาขึ้นสำหรับมือถือ)
    function createDecoration() {
        const items = ['🌸', '🧡', '✨', '☁️', '🎈'];
        const el = document.createElement('div');
        el.className = 'item';
        el.innerText = items[Math.floor(Math.random() * items.length)];
        el.style.left = Math.random() * 90 + 'vw';
        el.style.fontSize = Math.random() * 15 + 15 + 'px';
        el.style.animationDuration = Math.random() * 3 + 5 + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 8000);
    }

    setInterval(createDecoration, 600);
</script>

</body>
</html>
